<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flovix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="nav">
    <div class="nav-logo">FLOV<span>IX</span></div>
    <div class="nav-links">
      <button class="nav-btn active" data-section="home">Home</button>
      <button class="nav-btn" data-section="movies">Movies</button>
      <button class="nav-btn" data-section="tv">TV Shows</button>
    </div>
    <div class="nav-search-wrap">
      <div class="search-box" id="searchBox">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search movies, shows..." autocomplete="off" />
        <button class="search-clear" id="searchClear">✕</button>
      </div>
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero" id="heroSection">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-tag" id="heroTag">TRENDING</div>
      <h1 class="hero-title" id="heroTitle">Loading...</h1>
      <p class="hero-desc" id="heroDesc"></p>
      <div class="hero-meta" id="heroMeta"></div>
      <div class="hero-actions">
        <button class="btn-play" id="heroPlayBtn">▶ Play</button>
        <button class="btn-info" id="heroInfoBtn">ℹ More Info</button>
      </div>
    </div>
    <div class="hero-dots" id="heroDots"></div>
  </section>

  <!-- MAIN CONTENT -->
  <main class="main" id="mainContent">
    <section class="row" id="continueRow" style="display:none">
      <h2 class="row-title">Continue Watching</h2>
      <div class="cards continue-cards" id="continueCards"></div>
    </section>
    <section class="row">
      <h2 class="row-title">Trending Now</h2>
      <div class="cards" id="trendingCards"></div>
    </section>
    <section class="row">
      <h2 class="row-title">Top Movies</h2>
      <div class="cards" id="topMoviesCards"></div>
    </section>
    <section class="row">
      <h2 class="row-title">Popular TV Shows</h2>
      <div class="cards" id="topTVCards"></div>
    </section>
  </main>

  <!-- PLAYER MODAL -->
  <div class="modal" id="playerModal">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-box">
      <button class="modal-close" id="modalClose">✕</button>

      <!-- Player -->
      <div class="player-wrap">
        <iframe id="playerIframe" src="" frameborder="0" allowfullscreen allow="autoplay; fullscreen"></iframe>
      </div>

      <!-- Info + Episodes -->
      <div class="modal-body">
        <div class="modal-info">
          <h2 id="modalTitle"></h2>
          <div class="modal-meta" id="modalMeta"></div>
          <p id="modalDesc"></p>
        </div>

        <!-- TV Episode Picker (Netflix style) -->
        <div class="episode-section" id="episodeSection" style="display:none">
          <div class="season-tabs" id="seasonTabs"></div>
          <div class="episode-grid" id="episodeGrid"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
